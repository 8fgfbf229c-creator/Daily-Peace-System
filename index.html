/* ═══════════════ SOUND ENGINE ═══════════════ */
function useSoundEngine(){
  const ctxRef=useRef(null);const srcRef=useRef(null);const gainRef=useRef(null);
  const stop=useCallback(()=>{
    try{
      if(gainRef.current&&ctxRef.current){
        gainRef.current.gain.cancelScheduledValues(ctxRef.current.currentTime);
        gainRef.current.gain.linearRampToValueAtTime(0,ctxRef.current.currentTime+1.1);
      }
      setTimeout(()=>{try{srcRef.current&&srcRef.current.stop();}catch(e){}srcRef.current=null;},1200);
    }catch(e){}
  },[]);
  const start=useCallback((type)=>{
    try{if(gainRef.current&&ctxRef.current){gainRef.current.gain.cancelScheduledValues(ctxRef.current.currentTime);gainRef.current.gain.linearRampToValueAtTime(0,ctxRef.current.currentTime+0.3);setTimeout(()=>{try{srcRef.current&&srcRef.current.stop();}catch(e){}},400);}
    }catch(e){}
    setTimeout(()=>{
      try{
        if(ctxRef.current&&ctxRef.current.state!=="closed"){try{ctxRef.current.close();}catch(e){}}
        ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
        const ctx=ctxRef.current;
        if(ctx.state==="suspended")ctx.resume();
        const sr=ctx.sampleRate;
        const buf=ctx.createBuffer(2,8*sr,sr);
        for(let ch=0;ch<2;ch++){
          const d=buf.getChannelData(ch);
          let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
          for(let i=0;i<d.length;i++){
            const w=Math.random()*2-1;
            b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;
            b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;
            d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*0.11;b6=w*.115926;
          }
        }
        const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
        const f1=ctx.createBiquadFilter();const f2=ctx.createBiquadFilter();
        if(type==="rain"){f1.type="lowpass";f1.frequency.value=1100;f1.Q.value=0.5;f2.type="highpass";f2.frequency.value=80;f2.Q.value=0.5;}
        else if(type==="ocean"){f1.type="lowpass";f1.frequency.value=320;f1.Q.value=2.5;f2.type="highpass";f2.frequency.value=25;f2.Q.value=0.5;}
        else{f1.type="bandpass";f1.frequency.value=680;f1.Q.value=0.4;f2.type="lowpass";f2.frequency.value=1900;f2.Q.value=0.5;}
        const gain=ctx.createGain();gain.gain.value=0;
        src.connect(f1);f1.connect(f2);f2.connect(gain);gain.connect(ctx.destination);
        src.start(0);
        gain.gain.linearRampToValueAtTime(0.17,ctx.currentTime+2.2);
        srcRef.current=src;gainRef.current=gain;
      }catch(e){console.error(e);}
    },480);
  },[]);
  return{start,stop};
}

/* ═══════════════ HELPERS ═══════════════ */
function Waveform({active,color}){
  const dl=["0s",".14s",".28s",".07s",".21s"];
  return(<div style={{display:"flex",alignItems:"center",gap:"2.5px",height:"22px"}}>
    {["w1","w2","w3","w4","w5"].map((a,i)=>(
      <div key={i} style={{width:"3px",height:"5px",borderRadius:"3px",background:color,
        animation:active?`${a} .72s ease-in-out infinite ${dl[i]}`:"none",opacity:active?1:.28,transition:"opacity .3s"}}/>
    ))}
  </div>);
}

/* Transition overlay — instant cover so no white flash between screens */
function Trans({bg}){
  return <div style={{position:"fixed",inset:0,background:bg,zIndex:900,
    animation:"fadeOut .38s ease .04s forwards",pointerEvents:"none"}}/>;
}

}

/* ═════════════════════════════════════════════════════════════
   5-STEP CALM FLOW — BLINK-FREE via direct DOM ref transitions
═════════════════════════════════════════════════════════════ */
function CalmFlow({c,onDone}){
  const [idx,setIdx]=useState(0);
  const contentRef=useRef(null);
  const calmMounted=useRef(false);
  const aff=AFFIRMATIONS[(new Date().getDate()-1)%AFFIRMATIONS.length];

  /* When idx changes, React updates DOM content, then we fade back in.
     KEY: opacity is NOT in the JSX style below, so React never resets it.
     Whatever opacity we set via ref persists through re-renders. */
  useEffect(()=>{
    const el=contentRef.current;
    if(!el) return;
    if(!calmMounted.current){
      /* First mount — content should be immediately visible, no animation. */
      calmMounted.current=true;
      el.style.opacity="1";
      el.style.transform="translateX(0)";
      return;
    }
    /* Subsequent step changes:
       goNext() already set opacity→0 via ref before setIdx().
       React re-rendered new content. Since opacity is NOT in JSX,
       React did NOT reset it — it stayed at 0. Now fade the new content in. */
    el.style.transition="none";
    el.style.opacity="0";
    el.style.transform="translateX(8px)";
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      el.style.transition="opacity .32s ease, transform .32s ease";
      el.style.opacity="1";
      el.style.transform="translateX(0)";
    }));
  },[idx]);

  const goNext=()=>{
    const el=contentRef.current;
    if(!el) return;
    el.style.transition="opacity .22s ease, transform .22s ease";
    el.style.opacity="0";
    el.style.transform="translateX(-8px)";
    setTimeout(()=>{
      if(idx>=CALM_STEPS.length-1){onDone();return;}
      setIdx(i=>i+1);
    },240);
  };

  const step=CALM_STEPS[idx];
  const prog=((idx+1)/CALM_STEPS.length)*100;

  return(<div style={{background:c.bg,minHeight:"100vh",display:"flex",flexDirection:"column",padding:"44px 28px 36px",fontFamily:"'DM Sans',sans-serif"}}>
    {/* Progress bar */}
    <div style={{height:"2px",background:c.border,borderRadius:"1px",marginBottom:"24px"}}>
      <div style={{height:"100%",width:`${prog}%`,background:c.green,borderRadius:"1px",transition:"width 1s ease"}}/>
    </div>
    {/* Step dots */}
    <div style={{display:"flex",gap:"6px",marginBottom:"32px"}}>
      {CALM_STEPS.map((_,i)=><div key={i} style={{flex:1,height:"3px",borderRadius:"2px",background:i<=idx?c.green:c.border,transition:"background .5s"}}/>)}
    </div>
    {/* Content — controlled by ref, never re-mounts */}
    <div ref={contentRef} style={{flex:1,display:"flex",flexDirection:"column"}}>
      <p style={{fontSize:"11px",letterSpacing:".32em",color:c.green,marginBottom:"10px",fontWeight:500}}>
        STEP {idx+1} OF {CALM_STEPS.length}
      </p>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,marginBottom:"6px",color:c.text,lineHeight:1.22}}>
        {step.title}
      </h2>
      <p style={{fontSize:"14px",color:c.muted,marginBottom:"24px"}}>{step.sub}</p>

      {step.type==="breath" && <BreathOrb c={c}/>}

      {step.type==="affirm" && (
        <div style={{background:c.surface2,borderRadius:"20px",padding:"28px",flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
          <p style={{fontSize:"11px",letterSpacing:".2em",color:c.green,marginBottom:"16px",fontWeight:500}}>YOUR AFFIRMATION FOR TODAY</p>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"26px",fontWeight:300,lineHeight:1.65,fontStyle:"italic",color:c.text}}>"{aff}"</p>
          <p style={{fontSize:"14px",color:c.muted,marginTop:"20px",lineHeight:1.6}}>Read this slowly.\nRead it once more. Let it settle into you.</p>
        </div>
      )}

      {(step.type==="body"||step.type==="ground"||step.type==="release")&&(
        <div style={{background:c.surface2,borderRadius:"20px",padding:"24px",flex:1}}>
          <p style={{fontSize:"16px",lineHeight:1.9,color:c.text,whiteSpace:"pre-line"}}>{step.text}</p>
        </div>
      )}
    </div>

    <button onClick={goNext}
      style={{marginTop:"20px",background:c.green,color:"#fff",border:"none",
        padding:"18px 32px",borderRadius:"100px",fontSize:"16px",fontWeight:500,width:"100%",letterSpacing:".02em",transition:"opacity .2s"}}
      onMouseEnter={e=>e.target.style.opacity=".88"} onMouseLeave={e=>e.target.style.opacity="1"}>
      {idx<CALM_STEPS.length-1?"Continue →":"I feel calm ✓"}
    </button>
  </div>);
}

/* ═════════════════════════════════════════════════════════════
   GUIDED MEDITATION PLAYER — blink-free segment transitions
═════════════════════════════════════════════════════════════ */
function MeditationPlayer({med,c,onClose,sStart,sStop,soundOn,setSound,setSoundOn}){
  const [started,setStarted]=useState(false);
  const [segIdx,setSegIdx]=useState(0);
  const [done,setDone]=useState(false);
  const [paused,setPaused]=useState(false);
  const textRef=useRef(null);
  const timerRef=useRef(null);
  const pausedRef=useRef(false);

  /* Start sound when meditation begins */
  const begin=()=>{
    setStarted(true);
    sStart(med.sound);
    setSoundOn(true);
    setSound(med.sound);
  };

  /* When segment index changes, animate the text */
  useEffect(()=>{
    if(!started) return;
    const el=textRef.current;
    if(!el) return;
    el.style.transition="none";
    el.style.opacity="0";
    el.style.transform="translateY(10px)";
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      el.style.transition="opacity .6s ease, transform .6s ease";
      el.style.opacity="1";
      el.style.transform="translateY(0)";
    }));
  },[segIdx,started]);

  /* Auto-advance timer */
  useEffect(()=>{
    if(!started||done) return;
    clearTimeout(timerRef.current);
    if(pausedRef.current) return;
    const seg=med.segs[segIdx];
    timerRef.current=setTimeout(()=>{
      if(pausedRef.current) return;
      if(segIdx>=med.segs.length-1){setDone(true);}
      else{
        const el=textRef.current;
        if(el){el.style.transition="opacity .35s ease";el.style.opacity="0";}
        setTimeout(()=>setSegIdx(i=>i+1),370);
      }
    },seg.s*1000);
    return()=>clearTimeout(timerRef.current);
  },[segIdx,started,done]);

  const togglePause=()=>{
    pausedRef.current=!pausedRef.current;
    setPaused(p=>!p);
    if(!pausedRef.current){
      // Resume — restart timer
      const seg=med.segs[segIdx];
      clearTimeout(timerRef.current);
      timerRef.current=setTimeout(()=>{
        if(segIdx>=med.segs.length-1){setDone(true);}
        else{const el=textRef.current;if(el){el.style.transition="opacity .35s ease";el.style.opacity="0";}setTimeout(()=>setSegIdx(i=>i+1),370);}
      },seg.s*1000);
    }
  };

  const advanceSeg=()=>{
    clearTimeout(timerRef.current);
    if(segIdx>=med.segs.length-1){setDone(true);return;}
    const el=textRef.current;
    if(el){el.style.transition="opacity .25s ease";el.style.opacity="0";}
    setTimeout(()=>setSegIdx(i=>i+1),270);
  };

  const NB="#0D0E1A";
  const prog=((segIdx+1)/med.segs.length)*100;

  if(done) return(
    <div style={{position:"fixed",inset:0,zIndex:500,background:NB,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"48px 32px",animation:"riseIn .7s ease"}}>
      <div style={{width:"76px",height:"76px",borderRadius:"50%",border:"1.5px solid #8FAFA8",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 32px",animation:"float 3s ease infinite"}}>
        <span style={{fontSize:"30px",color:"#8FAFA8"}}>✓</span>
      </div>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"44px",fontWeight:300,color:"#E8E2D8",marginBottom:"16px"}}>Complete.</h2>
      <p style={{fontSize:"17px",color:"#545470",lineHeight:1.78,maxWidth:"280px",margin:"0 auto 48px"}}>
        Carry this stillness with you.
      </p>
      <button onClick={()=>{sStop();onClose();}}
        style={{background:"#526D6A",color:"#fff",border:"none",padding:"20px 48px",borderRadius:"100px",fontSize:"16px",fontWeight:500}}>
        Return Home
      </button>
    </div>
  );

  /* Intro screen */
  if(!started) return(
    <div style={{position:"fixed",inset:0,zIndex:500,overflow:"hidden"}}>
      <NatureCard src={med.img} grad={med.grad} style={{width:"100%",height:"100%",borderRadius:0}}>
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"space-between",padding:"52px 28px 52px"}}>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.12)",border:"none",borderRadius:"100px",padding:"8px 18px",fontSize:"13px",color:"rgba(255,255,255,.8)",alignSelf:"flex-start",backdropFilter:"blur(8px)"}}>← Back</button>
          <div>
            <p style={{fontSize:"11px",letterSpacing:".35em",color:"rgba(255,255,255,.6)",marginBottom:"12px",fontWeight:500}}>{med.badge.toUpperCase()} · {med.duration}</p>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"44px",fontWeight:300,lineHeight:1.18,color:"#fff",marginBottom:"14px"}}>{med.title}</h1>
            <p style={{fontSize:"17px",color:"rgba(255,255,255,.72)",lineHeight:1.65,marginBottom:"40px"}}>{med.tagline}</p>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"36px"}}>
              <span style={{fontSize:"15px",color:"rgba(255,255,255,.55)"}}>{med.sound==="rain"?"🌧 Rain":med.sound==="ocean"?"🌊 Ocean":"🌿 Forest"} will play during this session</span>
            </div>
            <button onClick={begin}
              style={{background:"rgba(255,255,255,.15)",backdropFilter:"blur(12px)",border:"1.5px solid rgba(255,255,255,.35)",color:"#fff",padding:"20px 40px",borderRadius:"100px",fontSize:"17px",fontWeight:500,width:"100%",letterSpacing:".02em"}}>
              Begin Meditation
            </button>
          </div>
        </div>
      </NatureCard>
    </div>
  );

  /* Active player */
  const seg=med.segs[segIdx];
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,overflow:"hidden"}}>
      <NatureCard src={med.img} grad="rgba(5,5,18,.88)" style={{width:"100%",height:"100%",borderRadius:0}}>
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:"44px 28px 52px"}}>
          {/* Top bar */}
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"28px"}}>
            <button onClick={()=>{clearTimeout(timerRef.current);sStop();onClose();}}
              style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:"100px",padding:"8px 16px",fontSize:"13px",color:"rgba(255,255,255,.7)"}}>✕</button>
            <div style={{flex:1,height:"2px",background:"rgba(255,255,255,.12)",borderRadius:"1px"}}>
              <div style={{height:"100%",width:`${prog}%`,background:"rgba(143,175,168,.75)",borderRadius:"1px",transition:"width 1s ease"}}/>
            </div>
            <button onClick={togglePause}
              style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:"100px",padding:"8px 16px",fontSize:"13px",color:"rgba(255,255,255,.7)"}}>
              {paused?"▷":"‖"}
            </button>
          </div>

          {/* Subtle background orb */}
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
            width:"300px",height:"300px",borderRadius:"50%",
            background:"radial-gradient(circle, rgba(82,109,106,.12), transparent)",
            animation:"orbIn 8s ease-in-out infinite",pointerEvents:"none"}}/>

          {/* Meditation text — center stage */}
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}}>
            <div ref={textRef} style={{maxWidth:"340px",opacity:0}}>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"28px",fontWeight:300,lineHeight:1.72,color:"rgba(255,255,255,.92)",whiteSpace:"pre-line"}}>
                {seg.text}
              </p>
            </div>
          </div>

          {/* Tap to advance */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"12px"}}>
            <p style={{fontSize:"12px",color:"rgba(255,255,255,.35)",letterSpacing:".08em"}}>
              {paused?"PAUSED":"TAP TO CONTINUE"}
            </p>
            <button onClick={advanceSeg}
              style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",borderRadius:"100px",padding:"14px 36px",fontSize:"15px",color:"rgba(255,255,255,.8)"}}>
              {segIdx>=med.segs.length-1?"Complete →":"Next →"}
            </button>
          </div>
        </div>
      </NatureCard>
    </div>
  );
}

/* ═════════════════════════════════════════════════════════════
   NIGHT RESET — blink-free step transitions
═════════════════════════════════════════════════════════════ */
function NightReset({c,onDone,trans,setTrans}){
  const [step,setStep]=useState(0);
  const contentRef=useRef(null);
  const autoRef=useRef(null);
  const nightMounted=useRef(false);
  const NB=c.dark?"#0D0E15":"#181A28";

  const nightNext=useCallback(()=>{
    const el=contentRef.current;
    if(!el) return;
    el.style.transition="opacity .24s ease";
    el.style.opacity="0";
    setTimeout(()=>setStep(s=>s+1),260);
  },[]);

  useEffect(()=>{
    const el=contentRef.current;
    if(!el) return;
    if(!nightMounted.current){
      /* First mount — show content immediately, no animation needed. */
      nightMounted.current=true;
      el.style.opacity="1";
    } else {
      /* After step change: nightNext() set opacity→0 via ref before setStep().
         React re-rendered new content. Since opacity is NOT in JSX,
         React did NOT reset it — it stayed at 0. Now fade new content in. */
      el.style.transition="none";
      el.style.opacity="0";
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.transition="opacity .38s ease";
        el.style.opacity="1";
      }));
    }
    clearTimeout(autoRef.current);
    const last=step>=NIGHT_STEPS.length-1;
    autoRef.current=setTimeout(()=>{
      if(last){onDone();}else nightNext();
    },13000);
    return()=>clearTimeout(autoRef.current);
  },[step]);

  const ns=NIGHT_STEPS[Math.min(step,NIGHT_STEPS.length-1)];
  return(<div style={{fontFamily:"'DM Sans',sans-serif",background:NB,minHeight:"100vh",display:"flex",flexDirection:"column",padding:"52px 28px 60px",color:"#E8E2D8"}}>
    <div style={{display:"flex",gap:"8px",marginBottom:"36px"}}>
      {NIGHT_STEPS.map((_,i)=><div key={i} style={{flex:1,height:"2px",borderRadius:"1px",background:i<=step?"#8FAFA8":"#252638",transition:"background .6s"}}/>)}
    </div>
    <div style={{textAlign:"center",marginBottom:"32px"}}>
      <div style={{fontSize:"36px",display:"inline-block",animation:"moonSway 6s ease-in-out infinite"}}>{ns.icon}</div>
    </div>
    <div ref={contentRef} style={{flex:1}}>
      <p style={{fontSize:"11px",letterSpacing:".32em",color:"#8FAFA8",marginBottom:"14px",fontWeight:500}}>NIGHT RESET · {step+1} OF {NIGHT_STEPS.length}</p>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,marginBottom:"22px",lineHeight:1.22,color:"#E8E2D8"}}>{ns.title}</h2>
      {ns.type==="nightBreath"
        ?<NightBreath/>
        :<div style={{background:"rgba(255,255,255,.04)",borderRadius:"18px",padding:"24px"}}>
          <p style={{fontSize:"16px",lineHeight:1.88,color:"#5A5A7A",whiteSpace:"pre-line"}}>{ns.body}</p>
        </div>
      }
    </div>
    <button onClick={()=>{clearTimeout(autoRef.current);if(step<NIGHT_STEPS.length-1)nightNext();else onDone();}}
      style={{marginTop:"24px",background:"#526D6A",color:"#fff",border:"none",borderRadius:"100px",padding:"20px 32px",fontSize:"15px",fontWeight:500,width:"100%",letterSpacing:".02em"}}>
      {step<NIGHT_STEPS.length-1?"Continue →":"Complete Night Reset →"}
    </button>
    {trans&&<Trans bg={NB}/>}
  </div>);
}

const JKEY="reset_journal_v2";
const JPROMPTS=["What happened today that I want to remember?","How did I feel today — really?","What am I grateful for right now, even if small?","What's one thing I'd tell myself tomorrow morning?"];
function JournalTab({c}){
  const today=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const dk=new Date().toISOString().split("T")[0];
  const [text,setText]=useState(()=>{try{return(JSON.parse(localStorage.getItem(JKEY)||"{}"))[dk]||"";}catch{return "";}});
  const [saved,setSaved]=useState(false);const [pastOpen,setPastOpen]=useState(false);const [past,setPast]=useState([]);const [sp,setSp]=useState(0);
  const save=()=>{try{const d=JSON.parse(localStorage.getItem(JKEY)||"{}");d[dk]=text;localStorage.setItem(JKEY,JSON.stringify(d));setSaved(true);setTimeout(()=>setSaved(false),2000);}catch(e){}};
  const loadPast=()=>{try{const d=JSON.parse(localStorage.getItem(JKEY)||"{}");const e=Object.entries(d).filter(([k])=>k!==dk).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7);setPast(e);}catch{}setPastOpen(true);};
  return(<div style={{padding:"52px 28px 24px",animation:"riseIn .5s ease",fontFamily:"'DM Sans',sans-serif"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
      <div>
        <p style={{fontSize:"11px",letterSpacing:".32em",color:c.green,marginBottom:"8px",fontWeight:500}}>TODAY'S JOURNAL</p>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"30px",fontWeight:300,color:c.text}}>{today}</h1>
      </div>
      <button onClick={loadPast} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:"100px",padding:"8px 16px",fontSize:"12px",color:c.muted,marginTop:"4px"}}>Past</button>
    </div>
    <div style={{display:"flex",gap:"7px",marginTop:"20px",marginBottom:"14px",overflowX:"auto",paddingBottom:"4px"}}>
      {JPROMPTS.map((p,i)=>(
        <button key={i} onClick={()=>setSp(i)} style={{flexShrink:0,padding:"8px 14px",borderRadius:"100px",fontSize:"12px",border:`1px solid ${sp===i?c.green:c.border}`,background:sp===i?`${c.green}15`:"transparent",color:sp===i?c.green:c.muted,transition:"all .2s",maxWidth:"190px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.slice(0,24)}…</button>
      ))}
    </div>
    <p style={{fontSize:"15px",color:c.text,lineHeight:1.65,marginBottom:"12px",fontStyle:"italic"}}>{JPROMPTS[sp]}</p>
    <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Start writing... this is only for you."
      style={{width:"100%",minHeight:"210px",background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"20px",fontSize:"16px",lineHeight:1.78,color:c.text,transition:"border-color .2s"}}
      onFocus={e=>e.target.style.borderColor=c.green} onBlur={e=>e.target.style.borderColor=c.border}/>
    <div style={{display:"flex",gap:"10px",marginTop:"12px"}}>
      <button onClick={save} style={{flex:1,background:saved?"#3a6b68":c.green,color:"#fff",border:"none",padding:"16px",borderRadius:"100px",fontSize:"15px",fontWeight:500,transition:"background .3s"}}>{saved?"Saved ✓":"Save entry"}</button>
      {text&&<button onClick={()=>setText("")} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:"100px",padding:"16px 20px",fontSize:"14px",color:c.muted}}>Clear</button>}
    </div>
    <p style={{fontSize:"12px",color:c.muted,textAlign:"center",marginTop:"14px"}}>Your entries are saved privately on this device.</p>
    {pastOpen&&(<div onClick={e=>{if(e.target===e.currentTarget)setPastOpen(false);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",zIndex:9999,display:"flex",flexDirection:"column",justifyContent:"flex-end",animation:"fadeIn .22s"}}>
      <div style={{background:c.surface,borderRadius:"28px 28px 0 0",padding:"32px 28px 52px",maxHeight:"70vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"24px"}}>
          <p style={{fontSize:"11px",letterSpacing:".32em",color:c.green,fontWeight:500}}>PAST ENTRIES</p>
          <button onClick={()=>setPastOpen(false)} style={{background:"transparent",border:"none",fontSize:"24px",color:c.muted}}>×</button>
        </div>
        {past.length===0?<p style={{color:c.muted,fontSize:"15px"}}>No past entries yet.</p>:past.map(([dt,tx])=>(
          <div key={dt} style={{marginBottom:"20px",paddingBottom:"20px",borderBottom:`1px solid ${c.border}`}}>
            <p style={{fontSize:"12px",color:c.green,marginBottom:"8px",fontWeight:500}}>{dt}</p>
            <p style={{fontSize:"15px",color:c.text,lineHeight:1.7,display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{tx}</p>
          </div>
        ))}
      </div>
    </div>)}
  </div>);
}

      {id:2,e:"⚡",t:"What Anxiety Actually Is",m:"4 min",c:["Anxiety isn't weakness. It's your brain being too good at its job.","Your brain runs a simulation — asking 'what could go wrong?' Not because something is wrong, but to protect you.","It can't tell the difference between a real danger and an email you're nervous about. Both trigger the same alarm.","So your heart races. Your chest tightens. Your thoughts loop. None of that means something bad is happening.","The way out isn't to fight it. It's to send your brain a calm signal: we're safe. We're here.","Anxiety is a messenger. Not a verdict."]},

      </div>
      {/* Hero — nature + Reset CTA */}
      <NatureCard src={scene.img} grad={scene.grad} onClick={()=>{setEmotion(null);go("state");}} style={{marginBottom:"14px"}}>
        <div style={{padding:"28px 26px 24px"}}>
          <p style={{fontSize:"11px",letterSpacing:".28em",color:"rgba(255,255,255,.6)",marginBottom:"10px"}}>YOUR DAILY RESET</p>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"28px",fontWeight:300,color:"#fff",marginBottom:"8px",lineHeight:1.2}}>5-Step Calm Flow</p>
          <p style={{fontSize:"13px",color:"rgba(255,255,255,.6)"}}>Breathe · Release · Ground · Let go · Affirm</p>
        </div>
      </NatureCard>
      {/* Two cards row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
        <div onClick={()=>{setNStep&&setNStep(0);go("night");}} style={{background:dark?"#191B2A":"#1C1E30",borderRadius:"20px",padding:"20px",cursor:"pointer",transition:"opacity .2s"}} onMouseEnter={e=>e.currentTarget.style.opacity=".9"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
          <div style={{fontSize:"24px",marginBottom:"10px",animation:"moonSway 6s ease-in-out infinite"}}>☽</div>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"17px",fontWeight:300,color:"#E8E2D8",lineHeight:1.3}}>Night Reset</p>
          <p style={{fontSize:"12px",color:"#4A4A68",marginTop:"4px"}}>Calm before sleep</p>
        </div>
        <div onClick={()=>{setGratTy(false);go("gratitude");}} style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"20px",padding:"20px",cursor:"pointer",transition:"border-color .25s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>
          <div style={{fontSize:"24px",marginBottom:"10px"}}>🌿</div>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"17px",fontWeight:300,color:c.text,lineHeight:1.3}}>Gratitude</p>
          <p style={{fontSize:"12px",color:c.muted,marginTop:"4px"}}>{grat.title}</p>
        </div>
      </div>
      {/* Affirmation */}
      <div style={{background:c.surface2,borderRadius:"22px",padding:"22px 24px",marginBottom:"14px"}}>
        <p style={{fontSize:"11px",letterSpacing:".28em",color:c.green,marginBottom:"12px",fontWeight:500}}>TODAY'S AFFIRMATION</p>
        <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"18px",fontWeight:300,lineHeight:1.65,fontStyle:"italic",color:c.text}}>"{aff}"</p>
      </div>
      {/* Sound */}
      <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"22px",padding:"20px 24px",marginBottom:"14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
          <p style={{fontSize:"11px",letterSpacing:".28em",color:c.green,fontWeight:500}}>AMBIENT SOUND</p>
          {soundOn&&<Waveform active={true} color={c.green}/>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
          {["rain","ocean","forest"].map(id=>(<button key={id} onClick={()=>handleSnd(id)} style={{padding:"12px 6px",borderRadius:"14px",border:`1px solid ${soundOn&&sound===id?c.green:c.border}`,background:soundOn&&sound===id?`${c.green}18`:"transparent",fontSize:"13px",color:soundOn&&sound===id?c.green:c.muted,fontWeight:soundOn&&sound===id?500:400,transition:"all .25s",display:"flex",flexDirection:"column",alignItems:"center",gap:"5px"}}>
            <span style={{fontSize:"18px"}}>{id==="rain"?"🌧":id==="ocean"?"🌊":"🌿"}</span>
            <span>{id[0].toUpperCase()+id.slice(1)}</span>
          </button>))}
        </div>
        {soundOn&&<button onClick={()=>handleSnd("silence")} style={{marginTop:"10px",background:"transparent",border:`1px solid ${c.border}`,borderRadius:"100px",padding:"8px 20px",fontSize:"12px",color:c.muted,width:"100%",transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>Stop sound</button>}
      </div>
      {/* Crisis */}
      <button onClick={()=>setCrisis(true)} style={{background:"transparent",border:`1px dashed ${c.border}`,borderRadius:"16px",padding:"18px 22px",width:"100%",textAlign:"left",display:"flex",alignItems:"center",gap:"14px",transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>
        <div style={{width:"36px",height:"36px",borderRadius:"50%",border:`1px solid ${c.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",color:c.muted,flexShrink:0}}>!</div>
        <div><div style={{fontSize:"14px",fontWeight:500,color:c.text}}>I need immediate help</div><div style={{fontSize:"12px",color:c.muted,marginTop:"2px"}}>Crisis support — always available</div></div>
      </button>
    </div>);

    /* MEDITATE TAB */
    const Meditate=()=>(<div style={{padding:"52px 28px 24px",animation:"riseIn .45s ease"}}>
      <p style={{fontSize:"11px",letterSpacing:".32em",color:c.green,marginBottom:"8px",fontWeight:500}}>GUIDED MEDITATION</p>
      <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,marginBottom:"8px"}}>Find Your Still</h1>
      <p style={{fontSize:"15px",color:c.muted,marginBottom:"28px"}}>Choose what you need right now. Let us guide you there.</p>
      <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
        {MEDITATIONS.map(m=>(
          <NatureCard key={m.id} src={m.img} grad={m.grad} onClick={()=>setActiveMed(m)} style={{cursor:"pointer"}}>
            <div style={{padding:"24px 24px 20px",display:"flex",alignItems:"center",gap:"16px"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"8px"}}>
                  <span style={{fontSize:"11px",letterSpacing:".22em",color:"rgba(255,255,255,.55)",fontWeight:500}}>{m.badge.toUpperCase()}</span>
                  <span style={{fontSize:"11px",color:"rgba(255,255,255,.35)"}}>·</span>
                  <span style={{fontSize:"11px",color:"rgba(255,255,255,.55)"}}>{m.duration}</span>
                </div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"22px",fontWeight:300,color:"#fff",marginBottom:"4px",lineHeight:1.2}}>{m.title}</p>
                <p style={{fontSize:"13px",color:"rgba(255,255,255,.6)"}}>{m.tagline}</p>
              </div>
              <div style={{width:"42px",height:"42px",borderRadius:"50%",border:"1px solid rgba(255,255,255,.3)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,backdropFilter:"blur(8px)",background:"rgba(255,255,255,.1)"}}>
                <span style={{color:"#fff",fontSize:"16px"}}>▷</span>
              </div>
            </div>
          </NatureCard>
        ))}
      </div>
    </div>);

    const Learn=()=>(<div style={{padding:"52px 28px 24px",animation:"riseIn .45s ease"}}>
      <p style={{fontSize:"11px",letterSpacing:".32em",color:c.green,marginBottom:"8px",fontWeight:500}}>UNDERSTAND YOUR MIND</p>
      <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,marginBottom:"8px"}}>Learn</h1>
      <p style={{fontSize:"15px",color:c.muted,marginBottom:"32px"}}>Short reads. Human language. No clinical tone.</p>
      <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
        {LEARN_DATA.map(t=>(<div key={t.id} onClick={()=>{setLtopic(t);go("learn-detail");}} style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"20px 22px",cursor:"pointer",display:"flex",alignItems:"center",gap:"16px",transition:"border-color .22s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>
          <div style={{fontSize:"26px",flexShrink:0}}>{t.e}</div>
          <div style={{flex:1}}><div style={{fontSize:"16px",fontWeight:500,color:c.text,marginBottom:"4px"}}>{t.t}</div><div style={{fontSize:"13px",color:c.muted}}>{t.m} read</div></div>
          <span style={{color:c.muted,fontSize:"20px"}}>›</span>
        </div>))}
      </div>
    </div>);

    const More=()=>(<div style={{padding:"52px 28px 24px",animation:"riseIn .45s ease"}}>
      <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,marginBottom:"32px"}}>More</h1>
      <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"20px 22px",marginBottom:"12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontSize:"16px",fontWeight:500,color:c.text}}>Dark Mode</div><div style={{fontSize:"13px",color:c.muted,marginTop:"2px"}}>Auto-enables at night (8pm – 6am)</div></div>
        <button onClick={()=>setDark(d=>!d)} style={{width:"52px",height:"28px",borderRadius:"14px",border:"none",background:dark?c.green:c.border,position:"relative",transition:"background .3s",flexShrink:0}}>
          <div style={{position:"absolute",top:"4px",left:dark?"26px":"4px",width:"20px",height:"20px",borderRadius:"50%",background:"#fff",transition:"left .28s ease",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
        </button>
      </div>
      <div onClick={()=>setTab("learn")} style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"20px 22px",marginBottom:"12px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>
        <div style={{fontSize:"16px",fontWeight:500,color:c.text}}>Learn about your mind</div>
        <span style={{color:c.muted,fontSize:"20px"}}>›</span>
      </div>
      <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"26px",marginTop:"12px"}}>
        <p style={{fontSize:"11px",letterSpacing:".22em",color:c.green,marginBottom:"20px",fontWeight:500}}>ABOUT RESET</p>
        {[["When to use","Morning Reset to start clear. Night Reset to calm your mind before sleep. Meditations anytime. Journal to process your day."],["What this is NOT","Not therapy. Not a replacement for professional mental health care. A real-time first-response tool for everyday emotional moments."],["No streaks. No guilt.","Come when you need it. Leave when you're ready. Rest is not failure."]].map(([t,b])=>(
          <div key={t} style={{marginBottom:"20px"}}><div style={{fontSize:"14px",fontWeight:500,color:c.text,marginBottom:"6px"}}>{t}</div><div style={{fontSize:"14px",color:c.muted,lineHeight:1.7}}>{b}</div></div>
        ))}
      </div>
      <p style={{textAlign:"center",fontSize:"12px",color:c.muted,marginTop:"32px",letterSpacing:".08em"}}>RESET · YOUR DAILY PEACE SYSTEM · V3.0</p>
    </div>);

    return(<div style={{...W,paddingBottom:"84px"}}>
      {tab==="home"    &&<Home/>}
      {tab==="meditate"&&<Meditate/>}
      {tab==="journal" &&<JournalTab c={c}/>}
      {tab==="learn"   &&<Learn/>}
      {tab==="more"    &&<More/>}

      {/* BOTTOM NAV */}
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:dark?"rgba(28,29,39,.97)":"rgba(245,241,233,.97)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:`1px solid ${c.border}`,display:"flex",padding:"8px 0 24px",zIndex:100,transition:"background .45s,border-color .45s"}}>
        {TABS.map(t=>{
          const active=tab===t.id&&t.id!=="reset"&&t.id!=="night";
          return(<button key={t.id}
            onClick={()=>{
              if(t.id==="reset"){go("state",190);}
              else if(t.id==="night"){go("night",190);}
              else setTab(t.id);
            }}
            style={{flex:1,background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",padding:"4px 0",transition:"opacity .2s"}}
            onMouseEnter={e=>e.currentTarget.style.opacity=".7"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
            <span style={{fontSize:"18px",color:active?c.green:c.muted,transition:"color .25s"}}>{t.i}</span>
            <span style={{fontSize:"10px",color:active?c.green:c.muted,fontWeight:active?500:400,transition:"color .25s"}}>{t.l}</span>
            {active&&<div style={{width:"4px",height:"4px",borderRadius:"50%",background:c.green,animation:"fadeIn .3s"}}/>}
          </button>);
        })}
      </nav>
      {trans&&<Trans bg={c.bg}/>}
      {crisis&&<CrisisModal c={c} onClose={()=>setCrisis(false)}/>}
    </div>);
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<ResetApp/>);
</script>
</body>
</html>
