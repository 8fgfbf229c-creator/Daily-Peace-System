/* ─── SOUND ENGINE ──────────────────────────────────────────── */
function useSoundEngine() {
  const ctx  = useRef(null);
  const node = useRef({src:null,gain:null});
  const stop = () => {
    try {
      if (node.current.gain && ctx.current)
        node.current.gain.gain.linearRampToValueAtTime(0, ctx.current.currentTime + 1.2);
      setTimeout(() => { try { node.current.src && node.current.src.stop(); node.current={src:null,gain:null}; } catch(e){} }, 1400);
    } catch(e){}
  };
  const start = (type) => {
    stop();
    setTimeout(() => {
      try {
        if (!ctx.current || ctx.current.state==="closed")
          ctx.current = new (window.AudioContext||window.webkitAudioContext)();
        if (ctx.current.state==="suspended") ctx.current.resume();
        const buf = ctx.current.createBuffer(1, 2*ctx.current.sampleRate, ctx.current.sampleRate);
        const d = buf.getChannelData(0);
        for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
        const src = ctx.current.createBufferSource();
        src.buffer = buf; src.loop = true;
        const f = ctx.current.createBiquadFilter();
        if(type==="rain")  {f.type="lowpass";  f.frequency.value=370;f.Q.value=1;}
        if(type==="ocean") {f.type="lowpass";  f.frequency.value=200;f.Q.value=3;}
        if(type==="forest"){f.type="bandpass"; f.frequency.value=650;f.Q.value=0.6;}
        const g = ctx.current.createGain(); g.gain.value=0;
        src.connect(f); f.connect(g); g.connect(ctx.current.destination);
        src.start(); g.gain.linearRampToValueAtTime(0.12, ctx.current.currentTime+1.8);
        node.current={src,gain:g};
      } catch(e){}
    }, 350);
  };
  return {start,stop};
}

/* ─── BREATHING SCREEN ──────────────────────────────────────── */
function BreathingScreen({c, onComplete}) {
  const PH = [{label:"Breathe in",dur:4,s:1.48},{label:"Hold",dur:4,s:1.48},{label:"Breathe out",dur:6,s:1.0}];
  const [ph,  setPh]  = useState(0);
  const [cnt, setCnt] = useState(4);
  const [rnd, setRnd] = useState(1);
  const [done,setDone]= useState(false);
  const ref = useRef(null);
  const rr  = useRef(1);

  useEffect(() => {
    if (done) return;
    let c2 = PH[ph].dur;
    setCnt(c2);
    clearInterval(ref.current);
    ref.current = setInterval(() => {
      c2--;
      if (c2 <= 0) {
        clearInterval(ref.current);
        const nx = (ph+1)%3;
        if (nx===0) { rr.current++; setRnd(rr.current); if(rr.current>4){setDone(true);return;} }
        setPh(nx);
      } else setCnt(c2);
    }, 1000);
    return () => clearInterval(ref.current);
  }, [ph, done]);

  /* Well Done */
  if (done) return (
    <div style={{minHeight:"100vh",background:c.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"48px 32px",animation:"fadeUp .7s ease forwards"}}>
      <div style={{width:"72px",height:"72px",borderRadius:"50%",border:`1.5px solid ${c.green}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 32px",animation:"float 3s ease infinite"}}>
        <span style={{fontSize:"28px",color:c.green}}>✓</span>
      </div>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"44px",fontWeight:300,color:c.text,marginBottom:"16px"}}>Well done.</h2>
      <p style={{fontSize:"17px",color:c.muted,lineHeight:1.78,maxWidth:"300px",margin:"0 auto 10px"}}>You just gave your nervous system exactly what it needed.</p>
      <p style={{fontSize:"15px",color:c.muted,maxWidth:"270px",margin:"0 auto 48px",lineHeight:1.7}}>Stay here for a moment before you continue.</p>
      <button onClick={onComplete} style={{background:c.green,color:"#fff",border:"none",padding:"20px 48px",borderRadius:"100px",fontSize:"16px",fontWeight:500,letterSpacing:"0.02em"}}>
        Continue
      </button>
    </div>
  );

  const cur = PH[ph];
  return (
    <div style={{minHeight:"100vh",background:c.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"48px 32px",animation:"fadeUp .5s ease forwards"}}>
      {/* Round dots */}
      <div style={{display:"flex",gap:"8px",marginBottom:"48px"}}>
        {[1,2,3,4].map(r=><div key={r} style={{width:"30px",height:"3px",borderRadius:"2px",background:r<=rnd?c.green:c.border,transition:"background .5s"}}/>)}
      </div>
      {/* Orb */}
      <div style={{position:"relative",width:"210px",height:"210px",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"44px"}}>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`1px solid ${c.green}20`,animation:"ripple 3.5s ease-out infinite"}}/>
        <div style={{position:"absolute",inset:"16px",borderRadius:"50%",border:`1px solid ${c.green}14`,animation:"ripple 3.5s ease-out .9s infinite"}}/>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`1.5px solid ${c.green}45`,background:`radial-gradient(circle at 38% 38%, ${c.green}24, ${c.green}06)`,transform:`scale(${cur.s})`,transition:`transform ${cur.dur}s ease-in-out`}}/>
        <div style={{position:"relative",zIndex:2}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"58px",fontWeight:300,color:c.text,lineHeight:1}}>{cnt}</div>
          <div style={{fontSize:"11px",color:c.greenL,letterSpacing:"0.07em",marginTop:"4px",fontWeight:500}}>{cur.label.toUpperCase()}</div>
        </div>
      </div>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,color:c.text,marginBottom:"6px"}}>{cur.label}</h2>
      <p style={{fontSize:"14px",color:c.muted,marginBottom:"52px",letterSpacing:"0.04em"}}>Round {rnd} of 4</p>
      <button onClick={()=>setDone(true)} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:"100px",padding:"14px 32px",fontSize:"14px",color:c.muted}}>

    if(view==="night"){

      const t=setTimeout(()=>{ if(last){setVisited(true);go("completion");}else setNStep(s=>s+1); },10500);
      return()=>clearTimeout(t);
    }
  },[view,nStep]);

  /* smooth nav */
  const go=(to,delay=220)=>{
    setTrans(true);
    setTimeout(()=>{ setView(to); setTimeout(()=>setTrans(false),80); },delay);
  };

  /* sound */
  const handleSnd=(id)=>{
    if(id==="silence"||(soundOn&&sound===id)){ sndStop(); setSoundOn(false); setSound("silence"); }
    else{ sndStart(id); setSoundOn(true); setSound(id); }
  };

  /* theme */
  const c={
    bg:dark?"#12131A":"#F5F1E9", surface:dark?"#1C1D27":"#FFFFFF",
    surface2:dark?"#22232F":"#EEE9DF", text:dark?"#E8E2D8":"#3D3D3D",
    muted:dark?"#787892":"#9A8E80", green:"#526D6A",
    greenL:dark?"#8FAFA8":"#526D6A", border:dark?"#2A2B3A":"#DFD8CC",
  };
  const W={fontFamily:"'DM Sans',sans-serif",background:c.bg,color:c.text,minHeight:"100vh",maxWidth:"430px",margin:"0 auto",position:"relative",transition:"background .45s,color .45s"};
  const F={animation:"fadeUp .55s ease forwards"};

  /* ── SPLASH ── */
  if(view==="splash") return(
    <div style={{...W,display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{textAlign:"center"}}>
        <p style={{fontSize:"11px",letterSpacing:"0.45em",color:c.green,marginBottom:"22px",fontWeight:500,animation:"fadeUp .7s ease"}}>RESET</p>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"46px",fontWeight:300,lineHeight:1.15,color:c.text,animation:"fadeUp .7s .22s ease both"}}>Your Daily<br/>Peace System</h1>
        <div style={{marginTop:"36px",display:"flex",justifyContent:"center",gap:"10px",animation:"fadeUp .7s .5s ease both"}}>
          {[0,1,2].map(i=><div key={i} style={{width:"5px",height:"5px",borderRadius:"50%",background:c.green,animation:`pulse ${1.4+i*.3}s ease infinite ${i*.22}s`}}/>)}
        </div>
      </div>
    </div>
  );

  /* ── ONBOARDING (Item 3 — exact text) ── */
  if(view==="onboard") return(
    <div style={{...W,display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"64px 32px 40px",...F}}>
        <p style={{fontSize:"11px",letterSpacing:"0.42em",color:c.green,marginBottom:"28px",fontWeight:500}}>RESET</p>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"40px",fontWeight:300,lineHeight:1.22,marginBottom:"22px"}}>
          Welcome to your<br/>Daily Peace System.
        </h1>
        <p style={{fontSize:"18px",color:c.muted,lineHeight:1.78,marginBottom:"48px"}}>
          Each morning or night, let's gently guide you back to calm.
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:"16px",marginBottom:"52px"}}>
          {[["Tell us how you feel first","The app reads your emotional state and adapts to you."],["Sessions can be 30 seconds or longer","You decide when you're done. No pressure, ever."],["Come back anytime","Morning, night, or crisis. No streaks. No guilt."]].map(([t,b])=>(
            <div key={t} style={{display:"flex",gap:"14px",alignItems:"flex-start"}}>
              <div style={{width:"7px",height:"7px",borderRadius:"50%",background:c.green,marginTop:"7px",flexShrink:0}}/>

        <button onClick={()=>go("state")}

      </div>
      <p style={{textAlign:"center",fontSize:"12px",color:c.muted,padding:"20px",letterSpacing:"0.1em"}}>NO STREAKS · NO PRESSURE · JUST PEACE</p>
      {trans&&<Trans bg={c.bg}/>}
    </div>
  );

  /* ── STATE ENTRY ── */
  if(view==="state") return(
    <div style={{...W,padding:"60px 28px 40px",...F}}>
      <p style={{fontSize:"11px",letterSpacing:"0.32em",color:c.green,marginBottom:"12px",fontWeight:500}}>CHECK IN</p>
      <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,marginBottom:"10px",lineHeight:1.22}}>How are you feeling<br/>right now?</h1>
      <p style={{color:c.muted,fontSize:"15px",marginBottom:"36px"}}>No wrong answers. Just be honest.</p>
      <div style={{display:"flex",flexDirection:"column",gap:"12px",marginBottom:"20px"}}>
        {EMOTIONS.map(em=>(
          <button key={em.id} onClick={()=>{setEmotion(em.id);go("response");}}

            onMouseEnter={e=>{e.currentTarget.style.borderColor=c.green;e.currentTarget.style.background=c.surface2;}}

              <div style={{fontSize:"16px",fontWeight:500,color:c.text}}>{em.label}</div>
              <div style={{fontSize:"13px",color:c.muted,marginTop:"3px"}}>{em.sub}</div>

          </button>
        ))}
      </div>
      <button onClick={()=>setCrisis(true)}
        style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:"14px",padding:"16px 24px",width:"100%",textAlign:"center",fontSize:"14px",color:c.muted,transition:"border-color .2s"}}

      </button>
      {trans&&<Trans bg={c.bg}/>}
      {crisis&&<CrisisModal c={c} onClose={()=>setCrisis(false)}/>}

  );

  /* ── RESPONSE ── */
  if(view==="response"&&emotion){
    const r=RESP[emotion];
    return(
      <div style={{...W,padding:"80px 32px 60px",display:"flex",flexDirection:"column",minHeight:"100vh",...F}}>
        <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>

  /* ── 30-SEC RESET ── */

        <button onClick={()=>{clearTimeout(sRef.current);if(rstStep<STEPS30.length-1)setRstStep(s=>s+1);else{setVisited(true);go("completion");}}}
          style={{marginTop:"32px",background:"transparent",border:`1px solid ${c.border}`,borderRadius:"100px",padding:"16px 32px",fontSize:"14px",color:c.muted,width:"100%",transition:"border-color .2s"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>

        </button>

        {crisis&&<CrisisModal c={c} onClose={()=>setCrisis(false)}/>}
      </div>
    );
  }

  /* ── FULL BREATHING RESET ── */
  if(view==="fullreset") return <>
    <BreathingScreen c={c} onComplete={()=>{setVisited(true);go("completion");}}/>
    {trans&&<Trans bg={c.bg}/>}
  </>;

  /* ── COMPLETION ── */
  if(view==="completion") return(
    <div style={{...W,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"48px 32px",textAlign:"center",...F}}>
      <div style={{width:"72px",height:"72px",borderRadius:"50%",border:`1.5px solid ${c.green}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 32px",animation:"float 3s ease infinite"}}>
        <span style={{fontSize:"28px",color:c.green}}>✓</span>
      </div>
      <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"46px",fontWeight:300,marginBottom:"16px"}}>Reset complete.</h1>
      <p style={{fontSize:"17px",color:c.muted,lineHeight:1.78,maxWidth:"320px",margin:"0 auto 8px"}}>You came back to yourself.<br/>That's the hardest and most important thing.</p>
      {isNight&&<p style={{fontSize:"14px",color:c.green,marginTop:"10px"}}>Come back tonight for your Night Reset.</p>}
      <div style={{display:"flex",flexDirection:"column",gap:"12px",marginTop:"44px",width:"100%"}}>
        <button onClick={()=>{setTab("home");go("main");}} style={{background:c.green,color:"#fff",border:"none",padding:"20px 32px",borderRadius:"100px",fontSize:"16px",fontWeight:500,letterSpacing:"0.02em"}}>
          Return Home
        </button>
        {isNight&&<button onClick={()=>{setNStep(0);go("night");}} style={{background:"transparent",border:`1px solid ${c.border}`,padding:"18px 32px",borderRadius:"100px",fontSize:"15px",color:c.muted,transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>Start Night Reset ☽</button>}
      </div>
      {trans&&<Trans bg={c.bg}/>}
    </div>
  );

  /* ── NIGHT RESET (Item 6 — slow, subtle moon) ── */
  if(view==="night"){
    const ns=NIGHT[Math.min(nStep,NIGHT.length-1)];
    const NB=dark?"#0D0E15":"#181A28";
    return(
      <div style={{...W,padding:"52px 32px 60px",minHeight:"100vh",display:"flex",flexDirection:"column",background:NB,color:"#E8E2D8"}}>
        <div style={{display:"flex",gap:"8px",marginBottom:"44px"}}>
          {NIGHT.map((_,i)=><div key={i} style={{flex:1,height:"2px",borderRadius:"1px",background:i<=nStep?"#8FAFA8":"#252638",transition:"background .6s"}}/>)}
        </div>
        <div style={{textAlign:"center",marginBottom:"48px"}}>
          {/* Item 6 — slow, gentle moon animation */}
          <div style={{fontSize:"38px",display:"inline-block",animation:"moonSway 6s ease-in-out infinite"}}>☽</div>
        </div>
        <div key={nStep} style={{...F,flex:1}}>
          <p style={{fontSize:"11px",letterSpacing:"0.32em",color:"#8FAFA8",marginBottom:"14px",fontWeight:500}}>NIGHT RESET</p>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"38px",fontWeight:300,marginBottom:"22px",lineHeight:1.22,color:"#E8E2D8"}}>{ns.t}</h2>
          <p style={{fontSize:"17px",lineHeight:1.84,color:"#545470"}}>{ns.b}</p>
        </div>
        <button onClick={()=>{if(nStep<NIGHT.length-1)setNStep(s=>s+1);else{setVisited(true);go("completion");}}}
          style={{marginTop:"32px",background:"#526D6A",color:"#fff",border:"none",borderRadius:"100px",padding:"20px 32px",fontSize:"15px",fontWeight:500,width:"100%",letterSpacing:"0.02em"}}>
          {nStep<NIGHT.length-1?"Continue →":"Complete Night Reset →"}
        </button>
        {trans&&<Trans bg={NB}/>}
      </div>
    );
  }

  /* ── GRATITUDE (Item 7 — Thank You screen after) ── */
  if(view==="gratitude"){
    if(gratTy) return(
      <div style={{...W,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"48px 32px",textAlign:"center",...F}}>
        <div style={{fontSize:"40px",animation:"float 3s ease infinite",marginBottom:"28px"}}>🌿</div>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"44px",fontWeight:300,marginBottom:"18px",color:c.text}}>Thank you.</h2>
        <p style={{fontSize:"17px",color:c.muted,lineHeight:1.78,maxWidth:"300px",margin:"0 auto 48px"}}>Taking a moment to be grateful is one of the most powerful things you can do for yourself.</p>
        <button onClick={()=>{setGratTy(false);setTab("home");go("main");}} style={{background:c.green,color:"#fff",border:"none",padding:"20px 48px",borderRadius:"100px",fontSize:"16px",fontWeight:500}}>
          Return Home
        </button>
        {trans&&<Trans bg={c.bg}/>}
      </div>
    );
    return(
      <div style={{...W,padding:"52px 28px 80px",...F}}>
        <button onClick={()=>{setTab("home");go("main");}} style={{background:"transparent",border:"none",color:c.muted,fontSize:"14px",marginBottom:"32px",padding:0,display:"block"}}>← Back</button>
        <p style={{fontSize:"11px",letterSpacing:"0.32em",color:c.green,marginBottom:"12px",fontWeight:500}}>TODAY'S GRATITUDE</p>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,marginBottom:"30px",lineHeight:1.22}}>{grat.title}</h1>
        <div style={{background:c.surface2,borderRadius:"22px",padding:"30px",marginBottom:"20px"}}>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"22px",fontWeight:300,lineHeight:1.7,fontStyle:"italic",color:c.text}}>"{grat.text}"</p>
        </div>
        <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"26px",marginBottom:"28px"}}>
          <p style={{fontSize:"11px",letterSpacing:"0.2em",color:c.green,marginBottom:"12px",fontWeight:500}}>REFLECT ON THIS</p>
          <p style={{fontSize:"16px",color:c.text,lineHeight:1.7}}>{grat.prompt}</p>
        </div>
        <button onClick={()=>setGratTy(true)} style={{background:c.green,color:"#fff",border:"none",padding:"18px 32px",borderRadius:"100px",fontSize:"15px",fontWeight:500,width:"100%",letterSpacing:"0.02em"}}>
          I've reflected ✓
        </button>
        {trans&&<Trans bg={c.bg}/>}
      </div>

  if(view==="learn-detail"&&ltopic) return(
    <div style={{...W,padding:"52px 28px 80px",...F}}>
      <button onClick={()=>{setTab("learn");go("main");}} style={{background:"transparent",border:"none",color:c.muted,fontSize:"14px",marginBottom:"28px",padding:0,display:"block"}}>← Learn</button>

      <div style={{display:"flex",flexDirection:"column",gap:"22px"}}>

  /* ═══════════════════════════════
     MAIN APP (tabs)

  if(view==="main"||visited){
    const TABS=[{id:"home",l:"Home",i:"⌂"},{id:"reset",l:"Reset",i:"↺"},{id:"learn",l:"Learn",i:"◎"},{id:"settings",l:"Settings",i:"⚙"}];

    const Home=()=>(
      <div key="h" style={{padding:"52px 28px 24px",...F}}>

        {/* Reset card */}
        <div onClick={()=>{setRstStep(0);go("state");}} style={{background:c.green,borderRadius:"22px",padding:"28px",marginBottom:"14px",cursor:"pointer",transition:"opacity .2s"}} onMouseEnter={e=>e.currentTarget.style.opacity=".9"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>

          <p style={{fontSize:"11px",letterSpacing:"0.28em",color:c.green,marginBottom:"10px",fontWeight:500}}>TODAY'S GRATITUDE</p>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"22px",fontWeight:300,marginBottom:"10px"}}>{grat.title}</p>
          <p style={{fontSize:"14px",color:c.muted,lineHeight:1.65}}>"{grat.text.slice(0,78)}..."</p>

              </button>

          </div>
          {soundOn&&<button onClick={()=>handleSnd("silence")} style={{marginTop:"10px",background:"transparent",border:`1px solid ${c.border}`,borderRadius:"100px",padding:"8px 20px",fontSize:"12px",color:c.muted,width:"100%",transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>Stop sound</button>}
        </div>

        {/* Crisis */}
        <button onClick={()=>setCrisis(true)} style={{background:"transparent",border:`1px dashed ${c.border}`,borderRadius:"16px",padding:"18px 22px",width:"100%",textAlign:"left",display:"flex",alignItems:"center",gap:"14px",transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>
          <div style={{width:"36px",height:"36px",borderRadius:"50%",border:`1px solid ${c.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",color:c.muted,flexShrink:0}}>!</div>
          <div><div style={{fontSize:"14px",fontWeight:500,color:c.text}}>I need immediate help</div><div style={{fontSize:"12px",color:c.muted,marginTop:"2px"}}>Crisis support — always available</div></div>
        </button>
      </div>
    );

    const Learn=()=>(
      <div key="l" style={{padding:"52px 28px 24px",...F}}>
        <p style={{fontSize:"11px",letterSpacing:"0.32em",color:c.green,marginBottom:"8px",fontWeight:500}}>UNDERSTAND YOUR MIND</p>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,marginBottom:"8px"}}>Learn</h1>
        <p style={{fontSize:"15px",color:c.muted,marginBottom:"32px"}}>Short reads. Human language. No clinical tone.</p>
        <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
          {LEARN.map(t=>(
            <div key={t.id} onClick={()=>{setLtopic(t);go("learn-detail");}} style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"20px 22px",cursor:"pointer",display:"flex",alignItems:"center",gap:"16px",transition:"border-color .22s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.green} onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>
              <div style={{fontSize:"26px",flexShrink:0}}>{t.e}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:"16px",fontWeight:500,color:c.text,marginBottom:"4px"}}>{t.t}</div>
                <div style={{fontSize:"13px",color:c.muted}}>{t.m} read</div>
              </div>
              <span style={{color:c.muted,fontSize:"20px"}}>›</span>
            </div>
          ))}
        </div>
      </div>
    );

    const Settings=()=>(
      <div key="s" style={{padding:"52px 28px 24px",...F}}>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"36px",fontWeight:300,marginBottom:"32px"}}>Settings</h1>
        {/* Dark mode */}
        <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"20px 22px",marginBottom:"12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{fontSize:"16px",fontWeight:500,color:c.text}}>Dark Mode</div><div style={{fontSize:"13px",color:c.muted,marginTop:"2px"}}>Auto-enables at night (8pm – 6am)</div></div>
          <button onClick={()=>setDark(d=>!d)} style={{width:"52px",height:"28px",borderRadius:"14px",border:"none",background:dark?c.green:c.border,position:"relative",transition:"background .3s",flexShrink:0}}>
            <div style={{position:"absolute",top:"4px",left:dark?"26px":"4px",width:"20px",height:"20px",borderRadius:"50%",background:"#fff",transition:"left .28s ease",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
          </button>
        </div>
        {/* Sound */}
        <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"20px 22px",marginBottom:"24px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
            <div><div style={{fontSize:"16px",fontWeight:500,color:c.text}}>Ambient Sound</div><div style={{fontSize:"13px",color:c.muted,marginTop:"2px"}}>{soundOn?`Playing: ${sound}`:"Off"}</div></div>
            {soundOn&&<Waveform active={true} color={c.green}/>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
            {["rain","ocean","forest"].map(id=>(
              <button key={id} onClick={()=>handleSnd(id)} style={{padding:"12px 6px",borderRadius:"14px",border:`1px solid ${soundOn&&sound===id?c.green:c.border}`,background:soundOn&&sound===id?`${c.green}18`:"transparent",fontSize:"13px",color:soundOn&&sound===id?c.green:c.muted,fontWeight:soundOn&&sound===id?500:400,transition:"all .25s",display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
                <span>{id==="rain"?"🌧":id==="ocean"?"🌊":"🌿"}</span>
                <span>{id.charAt(0).toUpperCase()+id.slice(1)}</span>
              </button>
            ))}
          </div>
          {soundOn&&<button onClick={()=>handleSnd("silence")} style={{marginTop:"10px",background:"transparent",border:`1px solid ${c.border}`,borderRadius:"100px",padding:"8px 20px",fontSize:"12px",color:c.muted,width:"100%"}}>Stop sound</button>}
        </div>
        {/* About */}
        <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"18px",padding:"26px"}}>
          <p style={{fontSize:"11px",letterSpacing:"0.22em",color:c.green,marginBottom:"20px",fontWeight:500}}>ABOUT RESET</p>
          {[["When to use","Morning Reset to start clear. Night Reset to close the day. Crisis support is always there."],["What this is NOT","Not therapy. Not a replacement for professional mental health care. A real-time first-response tool for everyday emotional moments."],["No streaks. No guilt.","Come when you need it. Leave when you're ready. Rest is not failure."],["About gratitude","Each day brings a new reading. Non-religious — honest thanks to God and the universe for the gift of being alive."]].map(([t,b])=>(
            <div key={t} style={{marginBottom:"20px"}}>
              <div style={{fontSize:"14px",fontWeight:500,color:c.text,marginBottom:"6px"}}>{t}</div>
              <div style={{fontSize:"14px",color:c.muted,lineHeight:1.7}}>{b}</div>
            </div>
          ))}
        </div>
        <p style={{textAlign:"center",fontSize:"12px",color:c.muted,marginTop:"32px",letterSpacing:"0.08em"}}>RESET · YOUR DAILY PEACE SYSTEM · V1.0</p>
      </div>
    );

    return(
      <div style={{...W,paddingBottom:"80px"}}>
        {tab==="home"    &&<Home/>}
        {tab==="learn"   &&<Learn/>}
        {tab==="settings"&&<Settings/>}

        {/* Bottom nav — Item 1: smooth Reset tab */}
        <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:dark?"rgba(28,29,39,.97)":"rgba(245,241,233,.97)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:`1px solid ${c.border}`,display:"flex",padding:"10px 0 26px",zIndex:100,transition:"background .45s,border-color .45s"}}>
          {TABS.map(t=>{
            const active=tab===t.id&&t.id!=="reset";
            return(
              <button key={t.id}
                onClick={()=>{
                  if(t.id==="reset"){
                    /* Item 1 — calm smooth transition to reset */
                    setRstStep(0); setNStep(0);
                    go("state",190);
                  } else setTab(t.id);
                }}
                style={{flex:1,background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",padding:"4px 0",transition:"opacity .2s"}}
                onMouseEnter={e=>e.currentTarget.style.opacity=".72"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                <span style={{fontSize:"20px",color:active?c.green:c.muted,transition:"color .25s"}}>{t.i}</span>
                <span style={{fontSize:"11px",color:active?c.green:c.muted,fontWeight:active?500:400,transition:"color .25s"}}>{t.l}</span>
                {active&&<div style={{width:"4px",height:"4px",borderRadius:"50%",background:c.green,animation:"fadeIn .3s ease"}}/>}
              </button>
            );
          })}
        </nav>

        {trans&&<Trans bg={c.bg}/>}
        {crisis&&<CrisisModal c={c} onClose={()=>setCrisis(false)}/>}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<ResetApp/>);
</script>
</body>
</html>
