<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Reset – Your Daily Peace System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* THE ANTI-BLINK FOUNDATION */
:root { --bg: #0A0F0D; --surface: #141A18; --green: #526D6A; --text: #E8E2D8; }

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  height: 100%;
  background-color: var(--bg) !important; /* Force background to stay dark */
  overflow-x: hidden;
}

#root {
  background-color: var(--bg);
  min-height: 100vh;
}

/* Smooth Fade for Content Transitions */
.fade-in {
  animation: fadeIn 0.4s ease-out forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

button { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; outline: none; }

@keyframes glow {
  0%, 100% { box-shadow: 0 0 20px rgba(82, 109, 106, 0.1); }
  50% { box-shadow: 0 0 40px rgba(82, 109, 106, 0.3); }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = { bg: "#0A0F0D", surface: "#141A18", border: "#232A28", green: "#526D6A", greenL: "#8FAFA8", text: "#E8E2D8", muted: "#A8A298" };

const EMOTIONS = [
  { id: "overwhelmed", label: "Overwhelmed" },
  { id: "stressed", label: "Stressed" },
  { id: "tired", label: "Mentally Tired" },
  { id: "calm", label: "Calm" }
];

const RESP = {
  overwhelmed: { msg: "Slow down.", sub: "One breath is enough.", btn: "Start Reset", next: "reset" },
  stressed: { msg: "Release the pressure.", sub: "You are doing okay.", btn: "Start Reset", next: "reset" },
  tired: { msg: "Rest is allowed.", sub: "Your mind needs a break.", btn: "Start Reset", next: "reset" },
  calm: { msg: "Peace is yours.", sub: "Let's keep it that way.", btn: "Go Home", next: "home" }
};

function BreathOrb() {
  const [ph, setPh] = useState(0);
  const [cnt, setCnt] = useState(4);
  const timer = useRef(null);

  useEffect(() => {
    let c = ph === 2 ? 6 : 4;
    setCnt(c);
    clearInterval(timer.current);
    timer.current = setInterval(() => {
      c--;
      if (c <= 0) {
        clearInterval(timer.current);
        setPh((prev) => (prev + 1) % 3);
      } else setCnt(c);
    }, 1000);
    return () => clearInterval(timer.current);
  }, [ph]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', margin: '40px 0' }}>
      <div style={{ width: 180, height: 180, borderRadius: '50%', border: `2px solid ${C.green}40`, display: 'flex', alignItems: 'center', justifyContent: 'center', animation: 'glow 4s infinite' }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: '56px', color: C.text }}>{cnt}</div>
          <div style={{ fontSize: '12px', letterSpacing: '0.2em', color: C.greenL }}>{ph === 0 ? "IN" : ph === 1 ? "HOLD" : "OUT"}</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('checkin');
  const [step, setStep] = useState(0);
  const [resetStep, setResetStep] = useState(0);

  const nav = (v, s = 0) => {
    setView(v);
    if (v === 'response') setStep(s);
    window.scrollTo(0, 0);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      
      {view === 'checkin' && (
        <div className="fade-in" style={{ padding: '60px 28px' }}>
          <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: '38px', textAlign: 'center', color: C.text, marginBottom: '40px' }}>How is your mind?</h2>
          <div style={{ display: 'grid', gap: '16px' }}>
            {EMOTIONS.map((e, i) => (
              <button key={e.id} onClick={() => nav('response', i)} style={{ background: C.surface, padding: '24px', borderRadius: '24px', border: `1px solid ${C.border}`, color: C.text, fontSize: '18px', textAlign: 'left' }}>{e.label}</button>
            ))}
          </div>
        </div>
      )}

      {view === 'response' && (
        <div className="fade-in" style={{ padding: '80px 28px', textAlign: 'center' }}>
          <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: '42px', color: C.text }}>{RESP[EMOTIONS[step].id].msg}</h2>
          <p style={{ color: C.muted, margin: '20px 0 60px', fontSize: '18px' }}>{RESP[EMOTIONS[step].id].sub}</p>
          <button onClick={() => nav(RESP[EMOTIONS[step].id].next)} style={{ width: '100%', height: '64px', background: C.green, borderRadius: '22px', fontSize: '17px', fontWeight: '600' }}>{RESP[EMOTIONS[step].id].btn}</button>
        </div>
      )}

      {view === 'reset' && (
        <div className="fade-in" style={{ padding: '60px 28px', flex: 1, display: 'flex', flexDirection: 'column' }}>
          <p style={{ color: C.greenL, letterSpacing: '0.2em', fontSize: '12px' }}>BREATH RESET</p>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <BreathOrb />
          </div>
          <button onClick={() => nav('home')} style={{ width: '100%', height: '64px', background: C.surface, border: `1px solid ${C.border}`, color: C.text, borderRadius: '22px' }}>Finish Reset</button>
        </div>
      )}

      {view === 'home' && (
        <div className="fade-in" style={{ padding: '60px 24px' }}>
          <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: '32px', color: C.text, marginBottom: '30px' }}>Welcome to Peace.</h2>
          <button onClick={() => nav('checkin')} style={{ width: '100%', padding: '24px', background: C.surface, border: `1px solid ${C.border}`, borderRadius: '24px', color: C.text, textAlign: 'left' }}>
            <p style={{ fontSize: '18px' }}>Daily Check-in</p>
            <p style={{ fontSize: '14px', color: C.muted }}>Return to center</p>
          </button>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
