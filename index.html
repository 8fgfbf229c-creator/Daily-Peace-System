/* ═══════════════ SOUND ENGINE ═══════════════ */
function useSoundEngine(){
  const ctxRef=useRef(null);const srcRef=useRef(null);const gainRef=useRef(null);
  const stop=useCallback(()=>{
    try{
      if(gainRef.current&&ctxRef.current){
        gainRef.current.gain.cancelScheduledValues(ctxRef.current.currentTime);
        gainRef.current.gain.linearRampToValueAtTime(0,ctxRef.current.currentTime+1.1);
      }
      setTimeout(()=>{try{srcRef.current&&srcRef.current.stop();}catch(e){}srcRef.current=null;},1200);
    }catch(e){}
  },[]);
  const start=useCallback((type)=>{
    try{if(gainRef.current&&ctxRef.current){gainRef.current.gain.cancelScheduledValues(ctxRef.current.currentTime);gainRef.current.gain.linearRampToValueAtTime(0,ctxRef.current.currentTime+0.3);setTimeout(()=>{try{srcRef.current&&srcRef.current.stop();}catch(e){}},400);}
    }catch(e){}
    setTimeout(()=>{
      try{
        if(ctxRef.current&&ctxRef.current.state!=="closed"){try{ctxRef.current.close();}catch(e){}}
        ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
        const ctx=ctxRef.current;
        if(ctx.state==="suspended")ctx.resume();
        const sr=ctx.sampleRate;
        const buf=ctx.createBuffer(2,8*sr,sr);
        for(let ch=0;ch<2;ch++){
          const d=buf.getChannelData(ch);
          let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
          for(let i=0;i<d.length;i++){
            const w=Math.random()*2-1;
            b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;
            b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;
            d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*0.11;b6=w*.115926;
          }
        }
        const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
        const f1=ctx.createBiquadFilter();const f2=ctx.createBiquadFilter();
        if(type==="rain"){f1.type="lowpass";f1.frequency.value=1100;f1.Q.value=0.5;f2.type="highpass";f2.frequency.value=80;f2.Q.value=0.5;}
        else if(type==="ocean"){f1.type="lowpass";f1.frequency.value=320;f1.Q.value=2.5;f2.type="highpass";f2.frequency.value=25;f2.Q.value=0.5;}
        else{f1.type="bandpass";f1.frequency.value=680;f1.Q.value=0.4;f2.type="lowpass";f2.frequency.value=1900;f2.Q.value=0.5;}
        const gain=ctx.createGain();gain.gain.value=0;
        src.connect(f1);f1.connect(f2);f2.connect(gain);gain.connect(ctx.destination);
        src.start(0);
        gain.gain.linearRampToValueAtTime(0.17,ctx.currentTime+2.2);
        srcRef.current=src;gainRef.current=gain;
      }catch(e){console.error(e);}
    },480);
  },[]);
  return{start,stop};
}

/* ═══════════════ HELPERS ═══════════════ */
function Waveform({active,color}){
  const dl=["0s",".14s",".28s",".07s",".21s"];
  return(<div style={{display:"flex",alignItems:"center",gap:"2.5px",height:"22px"}}>
    {["w1","w2","w3","w4","w5"].map((a,i)=>(
      <div key={i} style={{width:"3px",height:"5px",borderRadius:"3px",background:color,
        animation:active?`${a} .72s ease-in-out infinite ${dl[i]}`:"none",opacity:active?1:.28,transition:"opacity .3s"}}/>
    ))}
  </div>);
}

/* Transition overlay — instant cover so no white flash between screens */
function Trans({bg}){
  return <div style={{position:"fixed",inset:0,background:bg,zIndex:900,
    animation:"fadeOut .38s ease .04s forwards",pointerEvents:"none"}}/>;
}

/* ═══════════════ BREATH ORB ═══════════════ */
function BreathOrb({c,small}){
  const PH=[{l:"Breathe in",d:4,s:1.5},{l:"Hold",d:4,s:1.5},{l:"Breathe out",d:6,s:1}];
  const [ph,setPh]=useState(0);const [cnt,setCnt]=useState(4);const [rnd,setRnd]=useState(1);
  const ref=useRef(null);const rr=useRef(1);
  useEffect(()=>{
    let c2=PH[ph].d;setCnt(c2);clearInterval(ref.current);
    ref.current=setInterval(()=>{c2--;if(c2<=0){clearInterval(ref.current);const nx=(ph+1)%3;if(nx===0){rr.current++;setRnd(rr.current);if(rr.current>3){clearInterval(ref.current);return;}}setPh(nx);}else setCnt(c2);},1000);
    return()=>clearInterval(ref.current);
  },[ph]);
  const cur=PH[ph];const sz=small?130:160;
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",margin:"24px 0"}}>
    <div style={{position:"relative",width:sz,height:sz,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`1px solid ${c.green}18`,animation:"ripple 3.5s ease-out infinite"}}/>
      <div style={{position:"absolute",inset:"10px",borderRadius:"50%",border:`1px solid ${c.green}12`,animation:"ripple 3.5s ease-out .9s infinite"}}/>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`1.5px solid ${c.green}45`,
        background:`radial-gradient(circle at 38% 38%, ${c.green}26, ${c.green}06)`,
        transform:`scale(${cur.s})`,transition:`transform ${cur.d}s ease-in-out`,animation:"glow 5s ease-in-out infinite"}}/>
      <div style={{position:"relative",zIndex:2,textAlign:"center"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:small?"42px":"50px",fontWeight:300,color:c.text,lineHeight:1}}>{cnt}</div>
        <div style={{fontSize:"10px",color:c.greenL,letterSpacing:".06em",marginTop:"4px",fontWeight:500}}>{cur.l.toUpperCase()}</div>
      </div>
    </div>
    <div style={{display:"flex",gap:"6px",marginTop:"12px"}}>
      {[1,2,3].map(r=><div key={r} style={{width:"22px",height:"2px",borderRadius:"1px",background:r<=rnd?c.green:c.border,transition:"background .5s"}}/>)}
    </div>
  </div>);
}

/* ═══════════════ NIGHT BREATH ═══════════════ */
function NightBreath(){
  const PH=[{l:"Breathe in",d:4,s:1.4},{l:"Hold",d:7,s:1.4},{l:"Breathe out",d:8,s:1}];
  const [ph,setPh]=useState(0);const [cnt,setCnt]=useState(4);
  const ref=useRef(null);
  useEffect(()=>{
    let c2=PH[ph].d;setCnt(c2);clearInterval(ref.current);
    ref.current=setInterval(()=>{c2--;if(c2<=0){clearInterval(ref.current);const nx=(ph+1)%3;setPh(nx);}else setCnt(c2);},1000);
    return()=>clearInterval(ref.current);
  },[ph]);
  const cur=PH[ph];
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",margin:"16px 0"}}>
    <div style={{position:"relative",width:"120px",height:"120px",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"1px solid rgba(143,175,168,.18)",animation:"ripple 4s ease-out infinite"}}/>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"1.5px solid rgba(143,175,168,.38)",
        background:"radial-gradient(circle,rgba(143,175,168,.18),transparent)",
        transform:`scale(${cur.s})`,transition:`transform ${cur.d}s ease-in-out`}}/>
      <div style={{position:"relative",zIndex:2,textAlign:"center"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"42px",fontWeight:300,color:"#E8E2D8",lineHeight:1}}>{cnt}</div>
        <div style={{fontSize:"10px",color:"#8FAFA8",letterSpacing:".06em",marginTop:"4px"}}>{cur.l.toUpperCase()}</div>
      </div>
    </div>
    <p style={{fontSize:"13px",color:"#545470",marginTop:"10px"}}>4 · 7 · 8 sleep breathing</p>
  </div>);
}

    return(<div style={{background:C.bg,color:C.text,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <Trans bg={C.bg}/>
      <div style={{position:"fixed",inset:0,zIndex:0}}>
        <img src={m.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity:.3}}/>
        <div style={{position:"absolute",inset:0,background:`linear-gradient(to bottom, ${C.bg}, transparent, ${C.bg})`}}/>
      </div>
      <div style={{position:"relative",zIndex:2,padding:"60px 28px",flex:1,display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"40px"}}>
          <button onClick={()=>{sound.stop();nav('meditation_list');}} style={{background:"transparent",color:C.text,fontSize:"20px"}}>×</button>
          <Waveform active={isPlaying} color={C.greenL}/>
          <div style={{width:"20px"}}/>
        </div>
        <div style={{textAlign:"center",marginTop:"40px"}}>
          <p style={{fontSize:"12px",letterSpacing:".2em",color:C.greenL,marginBottom:"12px"}}>SITTING IN STILLNESS</p>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"32px",fontWeight:300}}>{m.title}</h2>
        </div>
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 10px"}}>
           <p key={medStep} style={{fontSize:"22px",lineHeight:1.6,textAlign:"center",animation:"fadeIn 2s ease",color:C.text,whiteSpace:"pre-wrap"}}>
             {isPlaying?seg.text:m.tagline}
           </p>
        </div>
        <div style={{paddingBottom:"80px",textAlign:"center"}}>
          <button onClick={toggle} style={{width:"80px",height:"80px",borderRadius:"50%",background:isPlaying?"transparent":C.green,border:`2px solid ${C.green}`,color:isPlaying?C.green:C.bg,fontSize:"14px",fontWeight:600,transition:"all .4s"}}>
            {isPlaying?"PAUSE":"START"}
          </button>
          <p style={{fontSize:"13px",color:C.muted,marginTop:"24px"}}>{isPlaying?`Step ${medStep+1} of ${m.segs.length}`:"Ready when you are"}</p>
        </div>
      </div>
    </div>);
  }

  return null;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
